; Sysmon synthetic test config — exercises every legacy-grammar feature.
; Comment lines start with ';' or '#'. Synthetic data only (no real hosts/creds).
#
config statusfile html /var/www/sysmon/status.html
config pageinterval 15
config logging local4
config dnslog 180
config dnsexpire 1200
config numfailures 3

; A top-level router; its children are only checked while it pings up (dependency tree).
core-rtr.example.net ping core-rtr.example.net noc@example.net {
   web.example.net ping web.example.net web-team@example.net {
      web.example.net tcp 443 https web-team@example.net
      web.example.net www /health OK weblabel web-team@example.net
      web.example.net https /health OK tlslabel web-team@example.net
   }
   mail.example.net ping mail.example.net mail-team@example.net {
      mail.example.net smtp smtp mail-team@example.net
      mail.example.net pop3 systest TESTPASS pop3 mail-team@example.net
      mail.example.net tcp 143 imap mail-team@example.net
   }
}

; numfailures changes here — only nodes parsed AFTER this line get max_down = 8.
config numfailures 8

ns1.example.net ping ns1.example.net dns-team@example.net {
   ns1.example.net udp 53 dns dns-team@example.net
   ns1.example.net authdns example.net dns-team@example.net
}

; A dropped/unsupported legacy type — parser should warn and skip, not fail the file.
oldhost.example.net nntp news ops@example.net

; A ping with no contact (syslog-only, no page).
edge-rtr.example.net ping edge-rtr.example.net
